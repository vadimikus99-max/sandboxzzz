name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - name: Install Buildozer Deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake
    - name: Install Buildozer
      run: pip install --user buildozer
    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        cd MySandGame # Твоя папка проекта
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sandbox-apk
        path: MySandGame/bin/*.apk
        
